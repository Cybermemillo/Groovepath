<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BassLab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body class="dark">

  <!-- ===== HEADER ===== -->
  <header class="app-header">
    <div class="header-inner">
      <div class="brand">
        <svg class="brand-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="14" width="28" height="4" rx="2" fill="currentColor" opacity="0.3"/>
          <rect x="2" y="20" width="28" height="4" rx="2" fill="currentColor" opacity="0.5"/>
          <rect x="2" y="8"  width="28" height="4" rx="2" fill="currentColor" opacity="0.7"/>
          <rect x="2" y="2"  width="28" height="4" rx="2" fill="currentColor"/>
          <circle cx="6" cy="4"  r="2" fill="var(--accent)"/>
          <circle cx="6" cy="10" r="2" fill="var(--accent)" opacity="0.7"/>
        </svg>
        <span class="brand-name">BassLab</span>
      </div>
      <div class="header-controls">
        <button id="themeToggle" class="btn-icon" title="Cambiar tema" aria-label="Cambiar tema">
          <svg id="themeIconDark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
          <svg id="themeIconLight" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/>
            <line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <!-- ===== MAIN APP ===== -->
  <main class="app-main">

    <!-- ===== CONTROLS PANEL ===== -->
    <section class="controls-panel" aria-label="Controles">

      <!-- Scale selector -->
      <div class="control-group">
        <label class="control-label">Nota raíz</label>
        <div class="note-grid" id="rootNoteGrid">
          <!-- Rendered by JS -->
        </div>
      </div>

      <div class="control-group">
        <label class="control-label">Escala</label>
        <select id="scaleSelect" class="styled-select">
          <option value="minor_pentatonic">Pentatónica menor</option>
          <option value="major_pentatonic">Pentatónica mayor</option>
          <option value="major">Escala mayor</option>
          <option value="minor">Escala menor natural</option>
          <option value="blues">Escala blues</option>
          <option value="dorian">Dórica</option>
          <option value="mixolydian">Mixolidia</option>
          <option value="phrygian">Frigia</option>
          <option value="lydian">Lidia</option>
          <option value="locrian">Locria</option>
        </select>
      </div>

      <div class="control-group">
        <label class="control-label">Arpegio</label>
        <select id="arpeggioSelect" class="styled-select">
          <option value="none">Ninguno</option>
          <option value="major_triad">Triada mayor</option>
          <option value="minor_triad">Triada menor</option>
          <option value="major_7">Mayor 7</option>
          <option value="dominant_7">Dominante 7</option>
          <option value="minor_7">Menor 7</option>
          <option value="minor_7b5">Menor 7 b5</option>
          <option value="diminished">Disminuido</option>
          <option value="augmented">Aumentado</option>
        </select>
      </div>

      <div class="control-group toggle-group">
        <label class="toggle-label" for="soloArpeggio">
          <span>Solo arpegio</span>
          <div class="toggle-switch">
            <input type="checkbox" id="soloArpeggio" />
            <span class="toggle-knob"></span>
          </div>
        </label>
      </div>

      <div class="control-group">
        <label class="control-label">Afinación</label>
        <select id="tuningSelect" class="styled-select">
          <option value="standard">Estándar (EADG)</option>
          <option value="drop_d">Drop D (DADG)</option>
          <option value="d_standard">D Estándar (DADG-1step)</option>
        </select>
      </div>

      <div class="control-group">
        <label class="control-label">Rango de trastes</label>
        <div class="range-row">
          <select id="fretFrom" class="styled-select range-select"></select>
          <span class="range-sep">–</span>
          <select id="fretTo" class="styled-select range-select"></select>
        </div>
        <div class="preset-row" id="rangePresets"></div>
      </div>

      <div class="control-group toggle-group">
        <label class="toggle-label" for="showNoteNames">
          <span>Mostrar nombres</span>
          <div class="toggle-switch">
            <input type="checkbox" id="showNoteNames" checked />
            <span class="toggle-knob"></span>
          </div>
        </label>
      </div>

      <div class="control-group toggle-group">
        <label class="toggle-label" for="showAllNotes">
          <span>Mostrar todas las notas</span>
          <div class="toggle-switch">
            <input type="checkbox" id="showAllNotes" checked />
            <span class="toggle-knob"></span>
          </div>
        </label>
      </div>

    </section>

    <!-- ===== FRETBOARD ===== -->
    <section class="fretboard-section" aria-label="Diapasón">
      <div class="fretboard-wrapper">
        <div class="fretboard-scroll">
          <div class="fretboard" id="fretboard" role="img" aria-label="Diapasón de bajo eléctrico">
            <!-- Rendered by JS -->
          </div>
        </div>
        <div class="fret-numbers" id="fretNumbers">
          <!-- Rendered by JS -->
        </div>
      </div>
    </section>

    <!-- ===== TUNER PANEL ===== -->
    <section class="tuner-panel" aria-label="Afinador">

      <div class="tuner-display">
        <div class="detected-note-wrap">
          <span class="detected-label">Nota detectada</span>
          <div class="detected-note" id="detectedNote">—</div>
          <div class="detected-octave" id="detectedOctave"></div>
        </div>

        <div class="tuner-meter-wrap">
          <div class="tuner-meter" id="tunerMeter">
            <div class="meter-track">
              <div class="meter-fill" id="meterFill"></div>
              <div class="meter-center-line"></div>
              <div class="meter-needle" id="meterNeedle"></div>
            </div>
            <div class="meter-labels">
              <span>♭ Bajo</span>
              <span class="tuner-status" id="tunerStatus">—</span>
              <span>Alto ♯</span>
            </div>
          </div>
        </div>

        <div class="tuner-freq">
          <span id="tunerFreq">— Hz</span>
        </div>
      </div>

      <div class="tuner-actions">
        <button id="micToggle" class="btn-mic" aria-label="Iniciar micrófono">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="23"/>
            <line x1="8"  y1="23" x2="16" y2="23"/>
          </svg>
          <span id="micLabel">Activar micrófono</span>
        </button>
        <div class="mic-status" id="micStatus">
          <span class="mic-dot" id="micDot"></span>
          <span id="micStatusText">Micrófono inactivo</span>
        </div>
      </div>

    </section>

    <!-- ===== LEGEND ===== -->
    <section class="legend" aria-label="Leyenda">
      <div class="legend-item">
        <span class="legend-dot tonic"></span>
        <span>Tónica</span>
      </div>
      <div class="legend-item">
        <span class="legend-dot scale-note"></span>
        <span>Nota de escala</span>
      </div>
      <div class="legend-item">
        <span class="legend-dot detected"></span>
        <span>Nota detectada</span>
      </div>
      <div class="legend-item">
        <span class="legend-dot off-scale"></span>
        <span>Fuera de escala</span>
      </div>
      <div class="legend-item">
        <span class="legend-dot arpeggio"></span>
        <span>Arpegio</span>
      </div>
    </section>

  </main>

  <!-- ===== TOOLTIP ===== -->
  <div class="note-tooltip" id="noteTooltip" aria-hidden="true"></div>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
